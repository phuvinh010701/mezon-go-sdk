version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
    - godot

linters-settings:
  gofmt:
    simplify: true
  revive:
    rules:
      - name: exported
        severity: warning

output:
  formats:
    - format: colored-line-number

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
